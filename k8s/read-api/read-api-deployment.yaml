apiVersion: apps/v1
kind: Deployment
metadata:
  name: read-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: read-api
  template:
    metadata:
      labels:
        app: read-api
    spec:
      containers:
      - name: read-api
        image: read-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: read-api-config
        env:
        - name: OTEL_COLLECTOR_ADDR
          value: "signoz-otel-collector:4317"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
---
apiVersion: v1
kind: Service
metadata:
  name: read-api
spec:
  selector:
    app: read-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
