apiVersion: apps/v1
kind: Deployment
metadata:
  name: spanner-emulator
  labels:
    app: spanner-emulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spanner-emulator
  template:
    metadata:
      labels:
        app: spanner-emulator
    spec:
      containers:
      - name: emulator
        image: gcr.io/cloud-spanner-emulator/emulator:latest
        ports:
        - containerPort: 9010
        - containerPort: 9020
---
apiVersion: v1
kind: Service
metadata:
  name: spanner-emulator
spec:
  selector:
    app: spanner-emulator
  ports:
    - name: grpc
      protocol: TCP
      port: 9010
      targetPort: 9010
    - name: http
      protocol: TCP
      port: 9020
      targetPort: 9020
